# ============================================================
#  ร้าน 100 บาท — Nginx reverse proxy (AlmaLinux)
#  Frontend (Next.js :3000)  +  Backend API/Socket.io (NestJS :4000)
#  วางไฟล์นี้ที่: /etc/nginx/conf.d/rt_mkttools.conf
# ============================================================

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    server_name rt.k-mkt.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    server_name rt.k-mkt.com;

    # SSL (ใช้ certbot/letsencrypt)
    ssl_certificate     /etc/letsencrypt/live/rt.k-mkt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rt.k-mkt.com/privkey.pem;

    client_max_body_size 20M;

    # --- Backend API ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Socket.io (WebSocket) ---
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # --- Frontend (Next.js) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
}
