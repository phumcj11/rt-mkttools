# ============================================================
#  ร้าน 100 บาท — Apache reverse proxy (สำหรับ DirectAdmin / Apache httpd)
#  Frontend (Next.js :3000)  +  Backend API/Socket.io (NestJS :4000)
#
#  ใช้บนเครื่องที่มี DirectAdmin/Apache อยู่แล้ว (Apache คุม port 80/443)
#  ต้องเปิดโมดูล: proxy proxy_http proxy_wstunnel rewrite
#    a2enmod (Debian) หรือ ตรวจ LoadModule ใน httpd.conf (AlmaLinux)
#
#  วิธีติดตั้ง (เลือกอย่างใดอย่างหนึ่ง):
#   A) DirectAdmin → ไปที่โดเมน rt.k-mkt.com → Custom HTTPD Configurations
#      วางบล็อกภายใน <VirtualHost> (เฉพาะส่วน Proxy/Rewrite ด้านล่าง) ลงในช่อง CUSTOM
#   B) Apache ทั่วไป → คัดลอกไฟล์นี้ไป /etc/httpd/conf.d/rt_mkttools-proxy.conf
#      แล้ว `systemctl reload httpd`
#  หมายเหตุ: ถ้า DirectAdmin จัดการ SSL ให้แล้ว ใช้บล็อก :443 (SSL ปิดท้ายไฟล์)
# ============================================================

<VirtualHost *:80>
    ServerName rt.k-mkt.com

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    # WebSocket (socket.io) -> backend :4000
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/socket.io/(.*) ws://127.0.0.1:4000/socket.io/$1 [P,L]

    # Backend API
    ProxyPass        /api  http://127.0.0.1:4000/api
    ProxyPassReverse /api  http://127.0.0.1:4000/api

    # Socket.io (HTTP long-polling fallback)
    ProxyPass        /socket.io  http://127.0.0.1:4000/socket.io
    ProxyPassReverse /socket.io  http://127.0.0.1:4000/socket.io

    # Frontend (Next.js) — ต้องอยู่ล่างสุด
    ProxyPass        /  http://127.0.0.1:3000/
    ProxyPassReverse /  http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "http"
</VirtualHost>

# ------------------------------------------------------------
#  HTTPS (ใช้เมื่อมีใบรับรอง SSL แล้ว — certbot หรือ DirectAdmin/Let's Encrypt)
#  แก้ path ใบรับรองให้ตรงกับระบบจริง
