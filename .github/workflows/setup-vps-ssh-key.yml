name: Setup VPS deploy SSH key

on:
  workflow_dispatch:

jobs:
  install-key:
    name: Install GitHub Actions public key on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Add deploy public key via root password
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            PUBKEY="${{ secrets.VPS_DEPLOY_PUBKEY }}"
            grep -Fq "$PUBKEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$PUBKEY" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "Deploy public key installed."
